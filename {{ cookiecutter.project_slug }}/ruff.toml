# ruff.toml — proyecto generado por dskit
#
# Exclusiones necesarias por la naturaleza del template:
#   - conftest.py y test_visualize.py contienen bloques Jinja2 {%...%}
#     que ruff no puede parsear como Python válido
#   - notebooks tienen imports fuera de orden (E402) por diseño
#   - main.py y tests tienen imports preparados para uso futuro (F401)

exclude = [
    "tests/conftest.py",
    "tests/test_visualize.py",
    "notebooks",
]

[lint]
ignore = [
    "F401",  # imports sin usar — frecuente en plantillas y scripts de DS
    "F811",  # redefinición de imports — ocurre en notebooks con celdas independientes
    "E402",  # imports no al inicio — normal en notebooks y scripts de DS
]
