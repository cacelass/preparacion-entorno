# .github/workflows/ci.yml
#
# CI del REPO TEMPLATE (dskit)
# Valida que el template genera proyectos sanos para todos los
# ml_type definidos en cookiecutter.json.
#
# Jobs:
#   1. lint-template      → ruff sobre el propio repo dskit
#   2. generated-project  → genera con cookiecutter + lint + pytest
#                           + sphinx, para cada ml_type × python

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────
# JOB 1 — Lint del propio repo template
# ──────────────────────────────────────────────────────────────────
jobs:
  lint-template:
    name: Lint template repo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: false

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install ruff
        run: uv tool install ruff

      - name: Ruff — lint
        run: uvx ruff check .

      - name: Ruff — format check
        run: uvx ruff format --check .

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 — Genera proyecto real y lo testea
  # ──────────────────────────────────────────────────────────────────
  generated-project:
    name: "[${{ matrix.ml_type }}] py${{ matrix.python }}"
    runs-on: ubuntu-latest
    needs: lint-template

    strategy:
      fail-fast: false
      matrix:
        ml_type: [supervisado, no_supervisado, redes_neuronales, hibrido]
        python: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v5

      # ── uv + Python ─────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: false

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      # ── Generar proyecto ─────────────────────────────────────
      - name: Install cookiecutter
        run: uv tool install cookiecutter

      - name: Generate project from template
        run: |
          uvx cookiecutter . \
            --no-input \
            --output-dir /tmp/generated \
            project_name="ci_test" \
            project_author_name="CI Bot" \
            project_author_email="ci@example.com" \
            project_description="Proyecto generado en CI" \
            ml_type="${{ matrix.ml_type }}" \
            python_version="${{ matrix.python }}" \
            project_version="0.1.0" \
            project_open_source_license="MIT"

      - name: Resolve generated project path
        id: proj
        run: |
          DIR=$(ls /tmp/generated | head -1)
          echo "path=/tmp/generated/$DIR" >> "$GITHUB_OUTPUT"

      # ── Entorno del proyecto generado ───────────────────────
      - name: Install dev + ml deps
        working-directory: ${{ steps.proj.outputs.path }}
        run: uv sync --frozen false --extra dev --extra ${{ matrix.ml_type }}

      # ── Calidad de código ────────────────────────────────────
      - name: Ruff — lint
        working-directory: ${{ steps.proj.outputs.path }}
        run: uv run ruff check .

      - name: Ruff — format check
        working-directory: ${{ steps.proj.outputs.path }}
        run: uv run ruff format --check .

      # ── Tests ────────────────────────────────────────────────
      - name: Pytest
        working-directory: ${{ steps.proj.outputs.path }}
        run: uv run pytest tests/ -v --tb=short --no-header

      # ── Sphinx docs ──────────────────────────────────────────
      - name: Build Sphinx docs
        working-directory: ${{ steps.proj.outputs.path }}/docs
        run: uv run make html SPHINXOPTS="-W --keep-going"

      # ── Artefacto HTML ───────────────────────────────────────
      - name: Upload Sphinx HTML
        if: matrix.python == '3.12' && matrix.ml_type == 'supervisado'
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs
          path: ${{ steps.proj.outputs.path }}/docs/build/html
          retention-days: 7